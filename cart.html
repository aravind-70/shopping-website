<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MahaNila Shopping Zone – Cart</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===== NAVIGATION ===== -->
  <header class="navbar">
    <a href="index.html" class="logo">👗 Mahanila Shopping Zone</a>
    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="cart.html" class="active cart-link">
        Cart <span class="cart-badge" id="cart-count">0</span>
      </a>
    </nav>
  </header>

  <!-- ===== CART CONTENT ===== -->
  <main class="container cart-page">
    <h2 class="section-title">Your Shopping Cart</h2>

    <!-- Shown when cart is empty -->
    <div id="empty-cart" class="empty-cart hidden">
      <p>🛒 Your cart is empty.</p>
      <a href="index.html" class="btn btn-primary">Continue Shopping</a>
    </div>

    <!-- Cart items table -->
    <div id="cart-content">
      <div class="cart-items" id="cart-items-list">
        <!-- Cart rows rendered by script.js -->
      </div>

      <!-- Order summary -->
      <div class="cart-summary">
        <h3>Order Summary</h3>
        <div class="summary-row">
          <span>Items (<span id="item-count">0</span>)</span>
          <span>₹<span id="subtotal">0.00</span></span>
        </div>
        <div class="summary-row summary-total">
          <span>Total</span>
          <span>₹<span id="total-price">0.00</span></span>
        </div>
        <button class="btn btn-primary btn-full" id="checkout-btn">
          Proceed to Checkout
        </button>
        <a href="index.html" class="btn btn-outline btn-full">Continue Shopping</a>
      </div>
    </div>
  </main>

  <!-- ===== FOOTER ===== -->
  <footer class="footer">
    <p>&copy; 2024 Mahanila Shopping Zone. All rights reserved.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
