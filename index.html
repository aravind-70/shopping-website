<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShopEasy – Home</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===== NAVIGATION ===== -->
  <header class="navbar">
    <a href="index.html" class="logo">🛍️ ShopEasy</a>
    <nav class="nav-links">
      <a href="index.html" class="active">Home</a>
      <a href="cart.html" class="cart-link">
        Cart <span class="cart-badge" id="cart-count">0</span>
      </a>
    </nav>
  </header>

  <!-- ===== HERO / SEARCH ===== -->
  <section class="hero">
    <h1>Find Your Favourite Products</h1>
    <p>Quality items at unbeatable prices</p>
    <input
      type="search"
      id="search-input"
      class="search-bar"
      placeholder="Search products…"
      aria-label="Search products"
    />
  </section>

  <!-- ===== PRODUCT GRID ===== -->
  <main class="container">
    <h2 class="section-title">Our Products</h2>
    <p id="no-results" class="no-results hidden">No products match your search.</p>

    <div class="product-grid" id="product-grid">
      <!-- Products are rendered by script.js -->
    </div>
  </main>

  <!-- ===== FOOTER ===== -->
  <footer class="footer">
    <p>&copy; 2024 ShopEasy. All rights reserved.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
